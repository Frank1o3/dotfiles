# --- Appearance ---
include colors.conf
background_opacity 0.9
dynamic_background_opacity yes

# Font Configuration
# Use 'kitty +list-fonts' to see available fonts. 'JetBrains Mono' is highly recommended.
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Window Padding (Gives the text some "breathing room")
window_padding_width 12

# Cursor Styling
cursor_shape          beam
cursor_beam_thickness 1.5
cursor_blink_interval 0

# --- Functionality ---

# Tab Bar Appearance (Matches Adwaita/Dark themes well)
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_font_style   bold
inactive_tab_font_style normal

# Window Management
confirm_os_window_close 0
remember_window_size    yes
initial_window_width    900
initial_window_height   600

# Performance & Mouse
repaint_delay   10
input_delay     3
sync_to_monitor yes
detect_urls     yes
open_url_with   default
copy_on_select  yes

# --- Keybindings ---
# Make scrolling feel more natural
map ctrl+shift+up    scroll_line_up
map ctrl+shift+down  scroll_line_down
map ctrl+shift+k     scroll_page_up
map ctrl+shift+j     scroll_page_down